<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — CorpPortal</title>
    <link rel="stylesheet" href="/static/portal.css">
</head>
<body class="form-page">
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/" style="text-decoration:none; display:flex; align-items:center; gap:8px; color:inherit;">
                <span class="brand-icon">⬡</span>
                <span class="brand-name">CorpPortal</span>
            </a>
        </div>
    </nav>

    {% if break_locators %}
    <div class="demo-banner" id="demo-break-banner">
        ⚠️ DEMO MODE: Element IDs changed to simulate developer code change. Self-Healing Engine will be tested.
    </div>
    {% endif %}

    <main class="form-container">
        <div class="form-card form-card-narrow" id="forgot-password-card">
            <div class="form-header">
                <div class="form-icon">🔑</div>
                <h1 class="form-title">Forgot Password?</h1>
                <p class="form-subtitle">No worries! Enter your email below and we'll send you a reset link.</p>
            </div>

            <form id="forgot-password-form" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="{% if break_locators %}resetEmail_v2{% else %}reset-email{% endif %}" class="form-label">Registered Email Address *</label>
                    <input
                        type="email"
                        id="{% if break_locators %}resetEmail_v2{% else %}reset-email{% endif %}"
                        name="email"
                        class="form-input"
                        placeholder="Enter your registered email"
                        autocomplete="email"
                    />
                    <span class="field-error" id="email-error"></span>
                </div>

                <div class="form-error-global" id="form-error-global" style="display:none;"></div>
                <div class="form-success" id="forgot-success-msg" style="display:none;"></div>

                <button
                    type="submit"
                    class="submit-btn"
                    id="{% if break_locators %}sendResetBtn_v2{% else %}send-reset-btn{% endif %}"
                >
                    Send Reset Link
                </button>

                <div class="form-footer-links">
                    <a href="/register" class="text-link" id="back-to-register-link">Create an account</a>
                    <span class="link-divider">|</span>
                    <a href="/" class="text-link" id="back-to-login-link">Back to Login</a>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errorDiv = document.getElementById('form-error-global');
            const successDiv = document.getElementById('forgot-success-msg');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            const email = e.target.email.value;

            try {
                const res = await fetch('/forgot-password/submit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email })
                });
                const result = await res.json();
                if (result.success) {
                    successDiv.textContent = result.message;
                    successDiv.style.display = 'block';
                    e.target.reset();
                } else {
                    errorDiv.innerHTML = result.errors.map(e => `<li>${e}</li>`).join('');
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerHTML = '<li>An unexpected error occurred. Please try again.</li>';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
