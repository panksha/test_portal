name: AI-Driven QA Automation Pipeline

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - registration
          - forgot_password
      break_locators:
        description: 'Simulate broken locators (self-healing demo)'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  TARGET_APP_PORT: 5000
  BREAK_LOCATORS: ${{ github.event.inputs.break_locators || 'false' }}

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Code Quality & Static Analysis
  # ─────────────────────────────────────────────
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Linting
        run: |
          pip install flake8
          flake8 qa_framework/ --max-line-length=120 --exclude=__pycache__
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 2: QA Test Execution
  # ─────────────────────────────────────────────
  qa-tests:
    name: QA Test Execution
    runs-on: ubuntu-latest
    needs: code-quality
    strategy:
      matrix:
        browser: [chrome]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome Driver
        uses: browser-actions/setup-chrome@latest

      - name: Start Target Web Application
        run: |
          python target_app/app.py &
          sleep 3
          curl -f http://localhost:${{ env.TARGET_APP_PORT }} || exit 1
        env:
          BREAK_LOCATORS: ${{ env.BREAK_LOCATORS }}

      - name: Analyze Regression Impact
        run: |
          echo "Running regression impact analysis..."
          python work_items/work_item_mapper.py --changed-files "RegistrationController,EmailService"

      - name: Run QA Automation Tests
        run: |
          mkdir -p qa_framework/reports/html
          mkdir -p qa_framework/reports/screenshots
          
          # Dynamically map the selected test suite
          TEST_SUITE="${{ github.event.inputs.test_suite || 'all' }}"
          TEST_PATH="qa_framework/tests/"
          
          if [ "$TEST_SUITE" = "registration" ]; then
            echo "Running User Registration test suite..."
            TEST_PATH="qa_framework/tests/test_registration.py"
          elif [ "$TEST_SUITE" = "forgot_password" ]; then
            echo "Running Forgot Password test suite..."
            TEST_PATH="qa_framework/tests/test_forgot_password.py"
          else
            echo "Running complete QA regression test suite..."
          fi
          
          python -m pytest "$TEST_PATH" \
            --html=qa_framework/reports/html/report.html \
            --self-contained-html \
            -v \
            --tb=short
        env:
          BASE_URL: http://localhost:${{ env.TARGET_APP_PORT }}
          BROWSER: ${{ matrix.browser }}
          HEADLESS: true
          BREAK_LOCATORS: ${{ env.BREAK_LOCATORS }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY || 'QA' }}

      - name: Check Self-Healing Log
        if: always()
        run: |
          if [ -f "qa_framework/reports/healing_log.json" ]; then
            echo "=== Self-Healing Events ==="
            cat qa_framework/reports/healing_log.json
          fi

      - name: Publish HTML Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-test-report-${{ matrix.browser }}
          path: qa_framework/reports/html/report.html
          retention-days: 30

      - name: Publish Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ matrix.browser }}
          path: qa_framework/reports/screenshots/
          retention-days: 7

      - name: Publish Healing Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: self-healing-log
          path: qa_framework/reports/healing_log.json
          retention-days: 30

  # ─────────────────────────────────────────────
  # JOB 3: Notify Results (Jira Status Integration)
  # ─────────────────────────────────────────────
  notify:
    name: Notify & Integrate
    runs-on: ubuntu-latest
    needs: qa-tests
    if: always()
    steps:
      - name: Post Results Summary
        run: |
          echo "========================================="
          echo "  QA Pipeline Execution Complete"
          echo "========================================="
          echo "Status: ${{ needs.qa-tests.result }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "-----------------------------------------"
          echo "Next Steps:"
          echo "  - Download HTML report from Artifacts"
          echo "  - Review self-healing log for locator drift"
          echo "  - File Jira bugs for any new failures"
          echo "========================================="

      - name: Create Real Jira Bug on Failure
        if: needs.qa-tests.result == 'failure' && secrets.JIRA_API_TOKEN != ''
        env:
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY || 'QA' }}
        run: |
          echo "Connecting to Jira Cloud to raise an automated bug ticket..."
          
          # 1. Base64 encode basic authentication credentials
          AUTH_HEADER=$(echo -n "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" | base64 -w 0)
          
          # 2. Fire POST request to Jira REST API v3
          curl --request POST \
            --url "$JIRA_BASE_URL/rest/api/3/issue" \
            --header "Authorization: Basic $AUTH_HEADER" \
            --header "Accept: application/json" \
            --header "Content-Type: application/json" \
            --data "{
              \"fields\": {
                \"project\": {
                  \"key\": \"$JIRA_PROJECT_KEY\"
                },
                \"summary\": \"[BUG] Automated QA Test Failure on Branch ${{ github.ref_name }}\",
                \"description\": {
                  \"type\": \"doc\",
                  \"version\": 1,
                  \"content\": [
                    {
                      \"type\": \"paragraph\",
                      \"content\": [
                        {
                          \"type\": \"text\",
                          \"text\": \"An E2E regression test case failed during pipeline run. Branch: ${{ github.ref_name }}. Action: Download the HTML Test Report and failure screenshots from the GitHub Actions run page: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                        }
                      ]
                    }
                  ]
                },
                \"issuetype\": {
                  \"name\": \"Bug\"
                },
                \"priority\": {
                  \"name\": \"High\"
                },
                \"labels\": [
                  \"automated-failure\",
                  \"regression\"
                ]
              }
            }"
          echo -e "\n[OK] Automated Jira ticket successfully requested!"
